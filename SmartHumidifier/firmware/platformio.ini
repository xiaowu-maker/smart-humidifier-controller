; ============================================================
; Smart Humidifier Controller (SHC) V1.0
; PlatformIO 项目配置文件
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; -------- 串口配置 --------
monitor_speed = 115200
upload_speed = 921600

; -------- 编译选项 --------
build_flags =
    -Wall -Wextra
    -Os
    -DCORE_DEBUG_LEVEL=0
    -DPROJECT_VERSION=\"1.0.0\"

; -------- Flash 配置 --------
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = default_ffat.csv

; -------- 库依赖 --------
lib_deps =
    ; AHT20 温湿度传感器驱动
    adafruit/Adafruit AHTX0 @ ^2.0.5
    ; SSD1306 OLED 显示驱动
    adafruit/Adafruit SSD1306 @ ^2.5.7
    ; Adafruit GFX 图形库（SSD1306 依赖）
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; Adafruit BusIO（I2C/SPI 总线抽象）
    adafruit/Adafruit BusIO @ ^1.14.5
    ; ArduinoJson（Web API JSON 序列化，V2.0 使用）
    bblanchon/ArduinoJson @ ^7.0.4
